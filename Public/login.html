<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - UPGRADE</title>

<link rel="stylesheet" href="CSS/style.css">
<script src="js/script.js" defer></script>

</head>

<body>

<main class="auth-container">

<div class="auth-card">

<form id="authForm">

<h2 id="formTitle">Criar Conta</h2>

<div class="input-group" id="nomeGroup">
<input type="text" id="nome" placeholder="Nome">
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" id="senha" placeholder="Senha" required>
</div>

<button type="submit" class="btn-login" id="btnSubmit">
Cadastrar
</button>

</form>

<p>
<span id="toggleText">Já tem conta?</span>
<a href="#" id="toggleLink">Fazer Login</a>
</p>

</div>

</main>

</body>
</html>
