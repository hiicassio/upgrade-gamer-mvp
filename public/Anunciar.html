<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPGrade - Preparar Loot</title>
    
    <meta property="og:title" content="UPGrade | Anunciar Jogo">
    <meta property="og:description" content="Desapegue dos jogos que já zerou e faça rolos com a galera da sua cidade.">
    
    <link rel="stylesheet" href="css/style.css">
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/web-analytics/script.js"></script>
</head>

<body>
    <header class="header">
        <div class="logo">
            <h1>UPGRADE</h1>
        </div>
        <nav class="nav-menu">
            <a href="index.html">Home</a>
            <a href="Anunciar.html" class="active">Anunciar Jogo</a>
            <a href="https://chat.whatsapp.com/DLlMZGtaeJPGh1DOwT4HQP" target="_blank" class="btn-login" style="text-decoration: none;">Lobby VIP</a>
        </nav>
    </header>

    <main class="container-anuncio">
        <h2 style="color: #FD9452; text-align: center; margin-bottom: 20px;">Preparar Loot para Anúncio</h2>
        
        <div class="campo">
            <label for="lootItem">Qual é o Loot? (Jogo ou Console)</label>
            <input type="text" id="lootItem" placeholder="Ex: The Last of Us Part II" required>
        </div>

        <div class="campo">
            <label for="lootPlataforma">Plataforma</label>
            <select id="lootPlataforma" required>
                <option value="">Selecione a plataforma</option>
                <option value="PlayStation">PlayStation</option>
                <option value="Xbox">Xbox</option>
                <option value="Nintendo Switch">Nintendo Switch</option>
                <option value="PC">PC</option>
                <option value="Outros">Outros (Retrô, etc)</option>
            </select>
        </div>

        <div class="campo">
            <label for="lootQuest">A sua Quest (Preço ou o que quer em troca)</label>
            <input type="text" id="lootQuest" placeholder="Ex: R$ 150 ou troco por Zelda" required>
        </div>

        <button class="btn-publicar" onclick="enviarParaWhatsApp()">Falar com a Moderação</button>
    </main>

    <footer>
        <p>UPgrade</p>
    </footer>

    <script>
    function enviarParaWhatsApp() {
        var loot = document.getElementById('lootItem').value;
        var plataforma = document.getElementById('lootPlataforma').value;
        var quest = document.getElementById('lootQuest').value;

        if(!loot || !plataforma || !quest) {
            alert("🕹️ Ops! Preencha qual é o Loot, a Plataforma e a sua Quest antes de enviar.");
            return;
        }

        var texto = "Fala moderação! Quero anunciar um item na comunidade:%0A%0A";
        texto += "🎮 *Loot:* " + loot + "%0A";
        texto += "🕹️ *Plataforma:* " + plataforma + "%0A";
        texto += "⚔️ *Minha Quest:* " + quest + "%0A%0A";
        texto += "Segue a foto do jogo. Pode aprovar pro grupo?";

        // ✅ Seu número atualizado com o código do país (55)
        var numeroModera = "5511984962661"; 
        
        var linkZap = "https://wa.me/" + numeroModera + "?text=" + texto;

        window.open(linkZap, '_blank');
    }
    </script>
</body>
</html>
