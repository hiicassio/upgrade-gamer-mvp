<body>
    <header class="header">
        <div class="logo">

    <main class="container-anuncio">

            <label>Nome do Jogo</label>
            <input type="text" id="nomeJogo" name="titulo" placeholder="Ex: The Last of Us Part II" required>
        </div>

        <div class="campo">
            <label>Link da Foto (Capa)</label>

        </div>

        <div class="campo">
            <label> Seu WhatsApp</label>
            <input type="tel" id="whatsapp" name="whatsapp" placeholder="(DDD) 99999-9999" required>
        </div>

        <div class="campo">
            <label> Preço ou Proposta de Troca</label>
            <input type="text" id="preco" name="preco" placeholder="Ex: R$ 150 ou troco por" required>
        </div>

        <div class="campo">
            <label>Plataforma</label>
            <select id="plataforma" name="plataforma" required>
                <option value="">Selecione a plataforma</option>

                <option value="Xbox Series X/S">Xbox Series X/S</option>
                <option value="Xbox One">Xbox One</option>
                <option value="Nintendo Switch">Nintendo Switch</option>
                <option value="PC">PC</option>
                <option value="Wii">Wii</option>
            </select>
        </div>

    Entrar no Lobby (WhatsApp VIP)
</a>
